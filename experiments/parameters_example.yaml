data: gab  # Gab dataset for incremental training

gab_args:
  folder: ./data/
  feats_per_node: 768

use_cuda: True

model: egcn_o #HELP: 
           #      egcn_h
           #      egcn_o

class_weights: [0.5, 0.5]
save_node_embeddings: False

incremental: True

finetune_epochs: 5  # Number of epochs for fine-tuning phases (after initial training)
num_epochs: 5
steps_accum_gradients: 1
learning_rate: 0.001 # use None to pick a random number between learning_rate_min and learning_rate_max
negative_mult_training: 1
negative_mult_test: 1
seed: 42
target_measure: MAP # measure to define the best epoch F1, Precision, Recall, MAP, AUC_ROC
target_class: 1 # Target class to get the measure to define the best epoch (all, 0, 1)
reset_optimizer_on_finetune: true  # true = reset optimizer (classic fine-tuning), false = keep momentum

adj_mat_time_window: None  # Time window to create the adj matrix for each timestep. Use None to use all the history (from 0 to t)
num_hist_steps: 1 

data_loading_params:
  batch_size: 1  # should be always 1
  num_workers: 0

gcn_parameters:
  layer_1_feats: 128
  layer_2_feats: 64
  k_top_grcu: 768
  num_layers: 2
  cls_feats: 100 # Hidden size of the classifier

comments:
  - comments
