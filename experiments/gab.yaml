data: gab  # bitcoinalpha bitcoinotc

gab_args:
  folder: ./data/
  edges_file: notused.edg  # Not used anymore but kept for compatibility
  aggr_time: 1  # Keep original snapshots (0-5)

use_cuda: True  # Disabled for debugging
use_logfile: True

model: egcn_h

task: link_pred # link_pred edge_cls

class_weights: [ 0.05, 0.95]
save_node_embeddings: False

train_proportion: 0.6  # Adjusted for 6 snapshots to get reasonable split sizes
dev_proportion: 0.2

# Incremental training settings
incremental: False  # Set to True to enable incremental training mode
num_snapshots: None  # Number of snapshots for incremental training (None = one per timestep)
finetune_epochs: 3  # Number of epochs for fine-tuning phases (after initial training)

num_epochs: 5 #number of passes though the data
steps_accum_gradients: 1
learning_rate: 0.005
learning_rate_min: 0.005
learning_rate_max: 0.05
negative_mult_training: 10  # Reduced from 100 to prevent memory issues
negative_mult_test: 10  # Reduced from 100 to prevent memory issues
smart_neg_sampling: True
target_measure: MAP # measure to define the best epoch F1, Precision, Recall, MRR, MAP, Loss
target_class: 1 # Target class to get the measure to define the best epoch (all, 0, 1)
early_stop_patience: 50

eval_after_epochs: 1
adj_mat_time_window: 1  # Time window to create the adj matrix for each timestep. Use None to use all the history (from 0 to t)
# adj_mat_time_window_min: 1
# adj_mat_time_window_max: 10
num_hist_steps: 1 # number of previous steps used for prediction (reduced for 6 snapshots)
# hyperparameters tuning ranges (not used for now)
num_hist_steps_min: 1 # only used if num_hist_steps: None
num_hist_steps_max: 2 # only used if num_hist_steps: None

data_loading_params:
  batch_size: 1
  num_workers: 0

gcn_parameters:
  feats_per_node: 768  # BERT embedding dimension
  feats_per_node_min: 768
  feats_per_node_max: 768
  layer_1_feats: 128  # Reduced from default for better performance
  layer_1_feats_min: 64
  layer_1_feats_max: 256
  layer_2_feats: 64  # Reduced from default
  layer_2_feats_same_as_l1: "False"
  k_top_grcu: 50  # Reduced to avoid index out of bounds
  num_layers: 2
  lstm_l1_layers: 1
  lstm_l1_feats: 107 # only used with sp_lstm_B_trainer
  lstm_l1_feats_min: 20
  lstm_l1_feats_max: 200
  lstm_l2_layers: 1 # only used with both sp_lstm_A_trainer and sp_lstm_B_trainer
  lstm_l2_feats: None # only used with both sp_lstm_A_trainer and sp_lstm_B_trainer
  lstm_l2_feats_same_as_l1: True
  cls_feats: 400 # Hidden size of the classifier
  cls_feats_min: 51
  cls_feats_max: 500
comments:
  - comments
