data: gab  # Gab dataset for incremental training

gab_args:
  folder: ./data/
  feats_per_node: 768  # BERT embedding dimension

use_cuda: True

model: egcn_o # egcn_h

class_weights: [0.5, 0.5] #[0.05, 0.95]
save_node_embeddings: False # TODO: set to True when we have stable training

incremental: True

finetune_epochs: 10  # Number of epochs for fine-tuning phases (after initial training)
num_epochs: 10  # Number of epochs for initial training
steps_accum_gradients: 1
learning_rate: 0.0001
negative_mult_training: 1 # num_negatives = 1 * num_positives
negative_mult_test: 1 # num_negatives = 1 * num_positives
target_measure: MAP  # Measure to define the best epoch
target_class: 1  # Target class for metric calculation
seed: 42

adj_mat_time_window: None
num_hist_steps: 1

data_loading_params:
  batch_size: 1
  num_workers: 0

gcn_parameters:
  layer_1_feats: 128
  layer_2_feats: 64
  k_top_grcu: 768 #50
  num_layers: 2
  lstm_l1_layers: 1
  lstm_l1_feats: 128
  lstm_l2_layers: 1
  lstm_l2_feats: 128
  cls_feats: 512

comments:
  - Incremental training configuration for Gab dataset
  - Train on snapshot i -> test on snapshot i+1
  - Fine-tune on snapshot i+1 -> test on snapshot i+2
  - Continues until all snapshots are processed
